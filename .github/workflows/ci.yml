name: ci

# The project's own test suite — runs entirely in deterministic mock mode for $0.
# This is the green badge that proves CIGate is real, reproducible software.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,crosscheck]"
      - name: Lint
        run: ruff check src tests || true
      - name: Test
        run: pytest -q
